services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false
  KonradMichalik\SolrDashboardWidgets\:
    resource: "../Classes/*"

  # --- Button providers for widget footers (link into backend modules) ----------
  typo3_solr_dashboard_widgets.button.site_configuration:
    class: KonradMichalik\SolrDashboardWidgets\Widgets\Provider\ModuleButtonProvider
    arguments:
      $routeIdentifiers: 'site_configuration'
      $title: 'LLL:EXT:typo3_solr_dashboard_widgets/Resources/Private/Language/locallang.xlf:button.siteConfig'

  typo3_solr_dashboard_widgets.button.searchbackend_indexqueue:
    class: KonradMichalik\SolrDashboardWidgets\Widgets\Provider\ModuleButtonProvider
    arguments:
      $routeIdentifiers: 'searchbackend_indexqueue'
      $title: 'LLL:EXT:typo3_solr_dashboard_widgets/Resources/Private/Language/locallang.xlf:button.indexQueue'

  typo3_solr_dashboard_widgets.button.searchbackend_info:
    class: KonradMichalik\SolrDashboardWidgets\Widgets\Provider\ModuleButtonProvider
    arguments:
      $routeIdentifiers: 'searchbackend_info'
      $title: 'LLL:EXT:typo3_solr_dashboard_widgets/Resources/Private/Language/locallang.xlf:button.solrInfo'

  typo3_solr_dashboard_widgets.button.scheduler_manage:
    class: KonradMichalik\SolrDashboardWidgets\Widgets\Provider\ModuleButtonProvider
    arguments:
      # v14 renamed the identifier to `scheduler`; keep `scheduler_manage` as fallback for v13.
      $routeIdentifiers: ['scheduler', 'scheduler_manage']
      $title: 'LLL:EXT:typo3_solr_dashboard_widgets/Resources/Private/Language/locallang.xlf:button.scheduler'

  typo3_solr_dashboard_widgets.button.solr_admin_ui:
    class: KonradMichalik\SolrDashboardWidgets\Widgets\Provider\SolrAdminUiButtonProvider
    arguments:
      $title: 'LLL:EXT:typo3_solr_dashboard_widgets/Resources/Private/Language/locallang.xlf:button.solrAdminUi'

  # --- Widgets ------------------------------------------------------------------
  KonradMichalik\SolrDashboardWidgets\Widgets\ConnectionStatusWidget:
    arguments:
      $buttonProvider: '@typo3_solr_dashboard_widgets.button.site_configuration'
    tags:
      - name: dashboard.widget
        identifier: 'solrDashboardWidgets.connectionStatus'
        groupNames: 'solr'
        title: 'LLL:EXT:typo3_solr_dashboard_widgets/Resources/Private/Language/locallang.xlf:widget.connectionStatus.title'
        description: 'LLL:EXT:typo3_solr_dashboard_widgets/Resources/Private/Language/locallang.xlf:widget.connectionStatus.description'
        iconIdentifier: 'typo3-solr-dashboard-widgets-connection-status'
        height: 'medium'
        width: 'small'

  KonradMichalik\SolrDashboardWidgets\Widgets\IndexQueueStatusWidget:
    arguments:
      $buttonProvider: '@typo3_solr_dashboard_widgets.button.searchbackend_indexqueue'
    tags:
      - name: dashboard.widget
        identifier: 'solrDashboardWidgets.indexQueueStatus'
        groupNames: 'solr'
        title: 'LLL:EXT:typo3_solr_dashboard_widgets/Resources/Private/Language/locallang.xlf:widget.indexQueueStatus.title'
        description: 'LLL:EXT:typo3_solr_dashboard_widgets/Resources/Private/Language/locallang.xlf:widget.indexQueueStatus.description'
        iconIdentifier: 'typo3-solr-dashboard-widgets-index-queue-status'
        height: 'medium'
        width: 'small'

  KonradMichalik\SolrDashboardWidgets\Widgets\IndexQueueErrorsWidget:
    arguments:
      $buttonProvider: '@typo3_solr_dashboard_widgets.button.searchbackend_indexqueue'
    tags:
      - name: dashboard.widget
        identifier: 'solrDashboardWidgets.indexQueueErrors'
        groupNames: 'solr'
        title: 'LLL:EXT:typo3_solr_dashboard_widgets/Resources/Private/Language/locallang.xlf:widget.indexQueueErrors.title'
        description: 'LLL:EXT:typo3_solr_dashboard_widgets/Resources/Private/Language/locallang.xlf:widget.indexQueueErrors.description'
        iconIdentifier: 'typo3-solr-dashboard-widgets-index-queue-errors'
        height: 'medium'
        width: 'medium'

  KonradMichalik\SolrDashboardWidgets\Widgets\DocumentsInIndexWidget:
    arguments:
      $buttonProvider: '@typo3_solr_dashboard_widgets.button.searchbackend_info'
    tags:
      - name: dashboard.widget
        identifier: 'solrDashboardWidgets.documentsInIndex'
        groupNames: 'solr'
        title: 'LLL:EXT:typo3_solr_dashboard_widgets/Resources/Private/Language/locallang.xlf:widget.documentsInIndex.title'
