services:
  solr:
    image: solr:9.7
    container_name: ddev-${DDEV_SITENAME}-solr
    hostname: solr
    user: "0:0"
    expose:
      - "8983"
    labels:
      com.ddev.site-name: ${DDEV_SITENAME}
      com.ddev.approot: ${DDEV_APPROOT}
    environment:
      - SOLR_JAVA_MEM=-Xms512m -Xmx512m
    volumes:
      - solr_data:/var/solr
    command:
      - bash
      - -c
      - "chown -R 8983:8983 /var/solr && exec runuser -u solr -- /opt/solr/docker/scripts/docker-entrypoint.sh solr-precreate core_en"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8983/solr/admin/cores?action=STATUS || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  solr_data:
